table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
th{background:var(--blau);color:#fff;padding:8px 11px;font-family:Arial,sans-serif;font-size:11.5px;text-align:left}

  .sidebar.open{transform:translateX(0)}

  .burger{display:flex}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}

</style>

function renderArchiv() {
  const karten = ARCHIV.map(a => `
    <div class="archiv-karte" onclick="zeigePage('archiv-detail','${a.nr}')">
      <div class="archiv-karte-nr">Ausgabe ${a.nr}${a.aktuell ? ' &nbsp;<span style="color:#b03030;font-weight:700">● AKTUELL</span>' : ''}</div>

      <div class="archiv-karte-btn">${NEWSLETTER_INHALT[a.nr] ? 'Ausgabe öffnen →' : '⏳ Inhalt folgt'}</div>

  return `

  <div class="page-hdr-inner">
    <div class="page-hdr-kicker">Alle Ausgaben</div>
    <h1>Newsletter-Archiv</h1>

<div class="archiv-grid">${karten}</div>`;

function renderArchivDetail(nr) {
  const a = ARCHIV.find(x => x.nr === nr);
  const inhalt = NEWSLETTER_INHALT[nr];
  const navBar = `
    <div class="archiv-nav">
      <button class="btn-back" onclick="zeigePage('archiv')">← Zurück zum Archiv</button>
      <span style="color:var(--matt);font-size:12px">Ausgabe ${nr} · ${a ? a.datum : ''}</span>
      ${a && !a.aktuell ? `<button class="btn-back" onclick="zeigePage('aktuell')" style="margin-left:auto;background:var(--blau);color:#fff;border-color:var(--blau)">Aktuelle Ausgabe →</button>` : ''}
    </div>`;
  if (inhalt) return navBar + inhalt;
  return navBar + `
    <div style="text-align:center;padding:48px 24px;background:var(--hell);border-radius:8px;border:1px solid var(--rand)">
      <div style="font-size:42px;margin-bottom:14px">📄</div>

        Funktion <code>inhalt_${nr.replace('/','_')}()</code> anlegen und in <code>NEWSLETTER_INHALT</code> eintragen.
      </p>
    </div>`;
}

function zeigePage(seite, nr) {
  document.querySelectorAll('.topbar-btn').forEach(b => b.classList.remove('aktiv'));
  if (seite === 'aktuell') document.querySelectorAll('.topbar-btn')[0].classList.add('aktiv');
  else if (seite === 'archiv' || seite === 'archiv-detail') document.querySelectorAll('.topbar-btn')[1].classList.add('aktiv');
  else if (seite === 'impressum') document.querySelectorAll('.topbar-btn')[2].classList.add('aktiv');
  const main = document.getElementById('main-content');
  if (seite === 'aktuell') main.innerHTML = renderAktuell();
  else if (seite === 'archiv') main.innerHTML = renderArchiv();
  else if (seite === 'archiv-detail') main.innerHTML = renderArchivDetail(nr);
  else if (seite === 'impressum') main.innerHTML = renderImpressum();
  window.scrollTo(0, 0);
  if (window.innerWidth <= 820) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
}

function scrollZu(id) {
  zeigePage('aktuell');
  setTimeout(() => { const el = document.getElementById('s-' + id); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 60);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

document.getElementById('sidebar-archiv').innerHTML = ARCHIV.slice(1, 5).map(a => `
  <div class="archiv-item" onclick="zeigePage('archiv-detail','${a.nr}')">
    <div class="archiv-nummer">Ausgabe ${a.nr}</div>
    <div class="archiv-datum">${a.datum}</div>
    <div class="archiv-thema">${a.highlight.split('·')[0].trim()}</div>
  </div>`).join('');

zeigePage('aktuell');
</script>
</body>
</html>
